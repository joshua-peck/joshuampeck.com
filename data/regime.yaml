regimes:
  danger:
    status: danger
    label:  Danger
    note: >
      The conditions the model is designed to detect are present.
      Credit stress, volatility trend, and price structure are all
      consistent with the Danger regime. The classification updates
      as conditions evolve.
  neutral:
    status: neutral
    label:  Neutral
    note: >
      No acute stress signals are present. Credit spreads, volatility,
      and price structure are all within normal ranges. The model reads
      current conditions as Neutral — the baseline state that
      describes the unremarkable majority of market history.
  extremes:
    status: extremes
    label:  Extremes
    note: >
      Strong directional momentum with compressing volatility. Price
      near recent highs, credit spreads tight, trend positive. The
      model reads current conditions as Extremes — the state that captures
      both melt-up periods and strong recoveries. Historically the
      highest Sharpe regime, though also the one that immediately
      precedes many major drawdowns.

